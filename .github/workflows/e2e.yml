name: E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
  NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'http://localhost:3005' }}
  BASE_URL: 'http://localhost:3005/tr'

jobs:
  playwright:
    name: Playwright Tests
    timeout-minutes: 120
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Build Next.js app (for production start)
        run: npm run build

      - name: Start Next.js server
        run: |
          npm run start -- -p 3005 -H 0.0.0.0 > next-server.log 2>&1 &
          echo $! > next-server.pid
          for i in {1..90}; do
            if curl -fsS http://127.0.0.1:3005/tr >/dev/null; then
              echo "Next.js server is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Next.js server did not become ready in time"
          cat next-server.log
          exit 1

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true
          PLAYWRIGHT_SKIP_WEBSERVER: '1'

      - name: Print Next.js server logs
        if: always()
        run: cat next-server.log || true
