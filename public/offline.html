<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çevrimdışı (Offline) | AI Keşif Platformu</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #09090b;
            color: #fafafa;
            text-align: center;
            padding: 20px;
        }
        .icon {
            width: 64px;
            height: 64px;
            margin-bottom: 24px;
            opacity: 0.5;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        p {
            color: #a1a1aa;
            margin-bottom: 24px;
            max-width: 400px;
            line-height: 1.5;
        }
        button {
            background-color: #fafafa;
            color: #09090b;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            font-size: 16px;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="2" y1="2" x2="22" y2="22"></line>
        <path d="M8.5 8.5a10 10 0 0 1 11.3 0"></path>
        <path d="M5 12a10 10 0 0 1 14 0"></path>
        <path d="M2 15a10 10 0 0 1 20 0"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
    </svg>
    <h1>İnternet Bağlantısı Yok</h1>
    <p>Görünüşe göre çevrimdışısınız. Uygulamayı kullanmaya devam etmek için lütfen bağlantınızı kontrol edin.</p>
    <button onclick="window.location.reload()">Yeniden Dene</button>
</body>
</html>
